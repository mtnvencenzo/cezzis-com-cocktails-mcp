apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cezzis-com-cocktails-mcp-shared-secrets
  namespace: cezzis
  labels:
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: shared-secret-store
    kind: SecretStore
  target:
    name: cezzis-com-cocktails-mcp-shared-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        OTLP_HEADERS: "Authorization=Bearer {{ .otelApiKey }}"
        COSMOS_CONNECTION_STRING: "AccountEndpoint=https://cosmosdb.azure-platform.svc.cluster.local:8081/;AccountKey={{ .cosmosDbAccountKey }};"
  data:
    - secretKey: otelApiKey
      remoteRef:
        key: otel-collector-api-key-onprem
    - secretKey: cosmosDbAccountKey
      remoteRef:
        key: azure-cosmosdb-account-key-onprem
