apiVersion: apps/v1
kind: Deployment
metadata:
  name: cezzis-com-cocktails-mcp
  namespace: cezzis
  labels:
    app: cezzis-com-cocktails-mcp
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: cezzis-com-cocktails-mcp
  template:
    metadata:
      labels:
        app: cezzis-com-cocktails-mcp
        app.kubernetes.io/part-of: cezzis
        app.kubernetes.io/managed-by: argocd
      annotations:
        dapr.io/enabled: "false"
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: cezzis-com-cocktails-mcp
          image: acrveceusgloshared001.azurecr.io/cocktailsmcp
          ports:
            - containerPort: 7999
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cezzis-com-cocktails-mcp-config
            - secretRef:
                name: cezzis-com-cocktails-mcp-shared-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: 7999
            initialDelaySeconds: 30
            periodSeconds: 300
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7999
            initialDelaySeconds: 40
            periodSeconds: 300
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
