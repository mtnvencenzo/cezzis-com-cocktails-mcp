apiVersion: apps/v1
kind: Deployment
metadata:
  name: cezzis-com-cocktails-mcp
  namespace: cezzis
  labels:
    app: cezzis-com-cocktails-mcp
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "400"
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: cezzis-com-cocktails-mcp
  template:
    metadata:
      labels:
        app: cezzis-com-cocktails-mcp
        app.kubernetes.io/part-of: cezzis
        app.kubernetes.io/managed-by: argocd
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "cezzis-com-cocktails-mcp"
        dapr.io/app-port: "7999"
        dapr.io/app-protocol: "http"
        dapr.io/log-level: "info"
        dapr.io/config: "cocktails-mcp-dapr-config"
        dapr.io/api-token-secret: "cezzis-shared-daprio-dapr-api-token"
        dapr.io/app-token-secret: "cezzis-shared-daprio-app-api-token"
        dapr.io/enable-native-sidecar: "true"
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: cezzis-com-cocktails-mcp
          image: acrveceusgloshared001.azurecr.io/cocktailsmcp
          ports:
            - containerPort: 7999
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cezzis-com-cocktails-mcp-config
            - secretRef:
                name: cezzis-com-cocktails-mcp-shared-secrets
            - secretRef:
                name: cezzis-com-cocktails-mcp-secrets
          startupProbe:
            httpGet:
              path: /healthz
              port: 7999
            periodSeconds: 3
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /healthz
              port: 7999
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7999
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
