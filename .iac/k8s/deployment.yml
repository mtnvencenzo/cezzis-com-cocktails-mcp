apiVersion: apps/v1
kind: Deployment
metadata:
  name: cezzis-com-cocktails-mcp
  namespace: cezzis
  labels:
    app: cezzis-com-cocktails-mcp
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "400"
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: cezzis-com-cocktails-mcp
  template:
    metadata:
      labels:
        app: cezzis-com-cocktails-mcp
        app.kubernetes.io/part-of: cezzis
        app.kubernetes.io/managed-by: argocd
      annotations: {}
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: cezzis-com-cocktails-mcp
          image: acrveceusgloshared001.azurecr.io/cocktailsmcp
          ports:
            - containerPort: 7999
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cezzis-com-cocktails-mcp-config
            - secretRef:
                name: cezzis-com-cocktails-mcp-shared-secrets
          startupProbe:
            httpGet:
              path: /health
              port: 7999
            periodSeconds: 3
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /health
              port: 7999
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 7999
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
